version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: bits_postgres
    restart: always
    environment:
      POSTGRES_USER: bits
      POSTGRES_PASSWORD: changeme123
      POSTGRES_DB: bits_crm_lz
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: bits_redis
    restart: always
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: bits_qdrant
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"

volumes:
  pg_data:
  qdrant_data:
